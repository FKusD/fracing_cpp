name: CMake CI

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null

          $exe = Get-ChildItem -Path build -Recurse -Filter "fracing_cpp.exe" | Select-Object -First 1
          if (-not $exe) { throw "fracing_cpp.exe not found" }

          Copy-Item $exe.FullName package/

          if (Test-Path "build/tracks") {
            Copy-Item "build/tracks" "package/tracks" -Recurse -Force
          }

          if (Test-Path "bc_policy.json") {
            Copy-Item "bc_policy.json" package/
          }

          if (Test-Path "ga_best_genome.json") {
            Copy-Item "ga_best_genome.json" package/
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fracing_cpp-windows
          path: package/

      - name: Zip release package
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: Compress-Archive -Path package\* -DestinationPath fracing_cpp-windows.zip -Force

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} fracing_cpp-windows.zip --generate-notes
